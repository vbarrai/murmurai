name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[build]"
          brew install create-dmg

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in spec and pyproject
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s/\"CFBundleVersion\": \".*\"/\"CFBundleVersion\": \"$VERSION\"/" murmurai.spec
          sed -i '' "s/\"CFBundleShortVersionString\": \".*\"/\"CFBundleShortVersionString\": \"$VERSION\"/" murmurai.spec
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

      - name: Build .app with PyInstaller
        run: pyinstaller murmurai.spec -y

      - name: Create DMG
        run: |
          create-dmg \
            --volname "murmurai" \
            --volicon "dist/murmurai.app/Contents/Resources/icon-windowed.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "murmurai.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "dist/murmurai-${{ steps.version.outputs.version }}-macos.dmg" \
            "dist/murmurai.app" \
          || create-dmg \
            --volname "murmurai" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "murmurai.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "dist/murmurai-${{ steps.version.outputs.version }}-macos.dmg" \
            "dist/murmurai.app"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/murmurai-${{ steps.version.outputs.version }}-macos.dmg

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="dist/murmurai-${VERSION}-macos.dmg"

          # Compute SHA256 of the DMG
          SHA256=$(shasum -a 256 "$DMG" | cut -d' ' -f1)

          # Clone homebrew-tap
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/vbarrai/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Update cask version and sha256
          sed -i '' "s|version \".*\"|version \"${VERSION}\"|" Casks/murmurai.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Casks/murmurai.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/murmurai.rb
          git commit -m "Update murmurai to v${VERSION}"
          git push
